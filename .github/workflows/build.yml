name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 21 — the project targets Java 21 toolchain.
      # Unlike ProCosmetics, this project uses Paper API (from
      # public Maven repos), so no BuildTools is needed.
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/*.jar

      - name: Determine release tag
        id: get_tag
        run: |
          if [ -f UPSTREAM_TAG ]; then
            TAG=$(cat UPSTREAM_TAG)
            echo "Using upstream tag: ${TAG}"
          else
            TAG="v${{ github.run_number }}"
            echo "No upstream tag found, using run number: ${TAG}"
          fi
          echo "release_tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: "Release ${{ steps.get_tag.outputs.release_tag }}"
          tag_name: "${{ steps.get_tag.outputs.release_tag }}"
          files: target/*.jar
